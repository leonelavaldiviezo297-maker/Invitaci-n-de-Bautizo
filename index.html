    <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Bautizo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#f6f1eb;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#sobre{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#f8efe5,#dfc6a3);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
    cursor:pointer;
    transition:1.5s;
}

#sobre img{
    width:280px;
    max-width:85%;
    filter:drop-shadow(0 10px 15px rgba(0,0,0,0.25));
    animation:latido 2.5s infinite;
}

#sobre p{
    margin-top:25px;
    color:#8a6b3f;
    font-size:22px;
    font-family:"Georgia",serif;
    letter-spacing:1px;
    text-shadow:0 2px 5px rgba(0,0,0,0.15);
}

@keyframes latido{
    0%{transform:scale(1);}
    50%{transform:scale(1.06);}
    100%{transform:scale(1);}
}

.ocultar{
    opacity:0;
    pointer-events:none;
}

#contenido{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transform:scale(.90);
    transition:1.5s;
}

#contenido.mostrar{
    opacity:1;
    transform:scale(1);
}

#contenido img{
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>
</head>

<body>

<div id="sobre" onclick="abrir()">
    <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
    <p>Toca el sobre para abrir la invitación</p>
</div>

<div id="contenido">
    <img src="invitacion.png">
</div>

<audio id="musica" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-memories.mp3" type="audio/mpeg">
</audio>

<script>
function abrir(){
    document.getElementById("sobre").classList.add("ocultar");
    document.getElementById("contenido").classList.add("mostrar");

    let musica=document.getElementById("musica");
    musica.play().catch(()=>{});
}
</script>

</body>
</html>
