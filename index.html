<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Bautizo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(#f7f3ed,#eadfcf);
overflow:hidden;
font-family:Georgia,serif;
}

#sobre{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:320px;
height:210px;
transition:1.6s;
z-index:20;
}

.base{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#efe4d3;
border:2px solid #d6b887;
border-radius:0 0 12px 12px;
box-shadow:0 15px 30px rgba(0,0,0,.18);
}

.tapa{
position:absolute;
width:100%;
height:120px;
background:#f8f1e7;
clip-path:polygon(0 100%,50% 0,100% 100%);
border:2px solid #d6b887;
transform-origin:top;
animation:abrir 2s forwards;
}

@keyframes abrir{

0%{
transform:rotateX(0deg);
}

100%{
transform:rotateX(180deg);
}

}

#invitacion{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,80px) scale(.9);
opacity:0;
width:90vw;
max-width:420px;
transition:2s;
z-index:10;

}

#invitacion img{

width:100%;
display:block;
border-radius:18px;
box-shadow:0 18px 45px rgba(0,0,0,.25);

animation:zoom 10s infinite alternate;

}

@keyframes zoom{

from{transform:scale(1);}
to{transform:scale(1.03);}

}

.visible{

opacity:1!important;
transform:translate(-50%,-20px) scale(1)!important;

}

.brillo{

position:absolute;
width:4px;
height:4px;
background:#ffe69a;
border-radius:50%;
animation:destello 3s linear infinite;

}

@keyframes destello{

0%{
opacity:0;
transform:scale(.2);
}

50%{
opacity:1;
transform:scale(2);
}

100%{
opacity:0;
transform:scale(.2);
}

}

</style>
</head>

<body>

<div id="sobre">

<div class="tapa"></div>

<div class="base"></div>

</div>

<div id="invitacion">

<img src="invitacion.jpg">

</div>

<script>

setTimeout(()=>{

document.getElementById("invitacion").classList.add("visible");

document.getElementById("sobre").style.opacity="0";

},1700);

for(let i=0;i<30;i++){

let b=document.createElement("div");

b.className="brillo";

b.style.left=Math.random()*100+"vw";

b.style.top=Math.random()*100+"vh";

b.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(b);

}

</script>

</body>
</html>
