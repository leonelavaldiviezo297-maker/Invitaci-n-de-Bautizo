<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Bautizo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#f6f1eb;
    overflow:hidden;
    font-family:Georgia,serif;
}

/* PANTALLA DEL SOBRE */
#sobre{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(#f8efe5,#e4cfb0);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
    cursor:pointer;
    transition:1.5s;
}

/* SOBRE */
.sobre{
    width:300px;
    height:210px;
    background:#fffaf1;
    position:relative;
    border-radius:8px;
    border:3px solid #c9a15b;
    box-shadow:0 20px 35px rgba(0,0,0,.25);
    overflow:hidden;
    animation:flotar 3s infinite;
}

/* TRIANGULO SUPERIOR */
.sobre:before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:0;
    height:0;
    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-top:110px solid #ead4b3;
}

/* LINEAS DEL SOBRE */
.sobre:after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:80px;
    background:
    linear-gradient(35deg,transparent 49%,#e2c89d 50%,transparent 51%),
    linear-gradient(-35deg,transparent 49%,#e2c89d 50%,transparent 51%);
}

/* SELLO */
.sello{
    position:absolute;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    width:65px;
    height:65px;
    background:#b98a45;
    border-radius:50%;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    z-index:2;
    box-shadow:0 5px 12px rgba(0,0,0,.3);
}

/* TEXTO */
#sobre p{
    margin-top:30px;
    color:#80613b;
    font-size:22px;
    text-align:center;
}

@keyframes flotar{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

.ocultar{
    opacity:0;
    pointer-events:none;
}

/* INVITACION */
#contenido{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transform:scale(.9);
    transition:1.5s;
}

#contenido.mostrar{
    opacity:1;
    transform:scale(1);
}

#contenido img{
    width:100%;
    height:100%;
    object-fit:contain;
}

</style>
</head>

<body>

<div id="sobre" onclick="abrir()">

    <div class="sobre">
        <div class="sello">✿</div>
    </div>

    <p>Toca el sobre para abrir la invitación</p>

</div>


<div id="contenido">
    <img src="invitacion.png">
</div>


<audio id="musica" loop>
<source src="https://www.bensound.com/bensound-music/bensound-memories.mp3" type="audio/mpeg">
</audio>


<script>
function abrir(){

document.getElementById("sobre").classList.add("ocultar");

document.getElementById("contenido").classList.add("mostrar");

document.getElementById("musica").play().catch(()=>{});

}
</script>

</body>
</html>
