<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Invitación Bautizo</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
background:#f5efe7;
font-family:Georgia,serif;
}

#sobre{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:300px;
height:180px;
z-index:3;
transition:1.5s;
}

.base{
position:absolute;
bottom:0;
width:100%;
height:95px;
background:#efe1cb;
border:2px solid #cfb487;
}

.triangulo{
position:absolute;
width:0;
height:0;
border-left:150px solid transparent;
border-right:150px solid transparent;
border-top:90px solid #faf4ea;
}

#card{
position:absolute;
left:50%;
top:55%;
transform:translate(-50%,80px);
width:88%;
max-width:420px;
opacity:0;
transition:2s;
}

#card img{
width:100%;
display:block;
border-radius:18px;
box-shadow:0 10px 35px rgba(0,0,0,.25);
animation:zoom 8s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.03);}
}

.visible{
opacity:1!important;
transform:translate(-50%,-40px)!important;
}

.spark{
position:absolute;
width:4px;
height:4px;
background:#f9dc73;
border-radius:50%;
animation:shine 3s infinite;
}

@keyframes shine{
0%{opacity:0;transform:scale(.5);}
50%{opacity:1;transform:scale(2);}
100%{opacity:0;transform:scale(.5);}
}

#texto{
position:absolute;
top:20px;
width:100%;
text-align:center;
color:#8a6d3b;
font-size:24px;
opacity:0;
transition:2s;
}

.mostrar{
opacity:1!important;
}
</style>
</head>

<body>

<div id="texto">
Bienvenidos al Bautizo de Amelia Kristin
</div>

<div id="sobre">
<div class="triangulo"></div>
<div class="base"></div>
</div>

<div id="card">
<img src="invitacion.jpg">
</div>

<script>

for(var i=0;i<25;i++){

var s=document.createElement("div");

s.className="spark";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(s);

}

setTimeout(function(){

document.getElementById("sobre").style.opacity="0";

document.getElementById("card").className="visible";

document.getElementById("texto").className="mostrar";

},1800);

</script>

</body>
</html>
